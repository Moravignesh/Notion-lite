version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=change-this-in-production-super-secret-key-32chars
      - DATABASE_URL=sqlite+aiosqlite:///./notion_lite.db
    volumes:
      - ./backend:/app
      - backend_db:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_db:
